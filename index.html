<!-- ==================== LÓGICA JAVASCRIPT / FIREBASE ==================== -->
<script type="module">
  // Importaciones Oficiales de Firebase v10
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { 
    getFirestore, 
    collection, 
    addDoc, 
    deleteDoc, 
    doc 
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { 
    getAuth, 
    signInWithEmailAndPassword, 
    onAuthStateChanged, 
    signOut 
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  // ⚠️ ASEGÚRATE DE PONER AQUÍ LAS CLAVES REALES DE TU CONSOLA DE FIREBASE:
  // (Configuración del proyecto ⚙️ -> Tus apps -> SDK setup and configuration)
  const firebaseConfig = {
    apiKey: "TU_API_KEY_REAL",
    authDomain: "reporte-inventario.firebaseapp.com",
    projectId: "reporte-inventario",
    storageBucket: "reporte-inventario.appspot.com",
    messagingSenderId: "TU_SENDER_ID_REAL",
    appId: "TU_APP_ID_REAL"
  };

  // Inicializar servicios
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const productosRef = collection(db, "productos");

  // DOM Elements
  const seccionLogin = document.getElementById("seccion-login");
  const seccionInventario = document.getElementById("seccion-inventario");
  const formLogin = document.getElementById("form-login");
  const errorLogin = document.getElementById("error-login");
  const inputEmail = document.getElementById("login-email");
  const inputPassword = document.getElementById("login-password");

  // Precargar datos de prueba para ingresar más rápido
  if (inputEmail && inputPassword) {
    inputEmail.value = "rodrigo20@gmail.com";
    inputPassword.value = "12345679";
  }

  // --- AUTENTICACIÓN: LOGIN ---
  formLogin.addEventListener("submit", async (event) => {
    event.preventDefault();
    errorLogin.classList.add("hidden");

    const email = inputEmail.value.trim();
    const password = inputPassword.value;

    try {
      await signInWithEmailAndPassword(auth, email, password);
      formLogin.reset();
    } catch (error) {
      console.error("Error al iniciar sesión:", error.code, error.message);
      
      // Mensajes de error personalizados según la respuesta de Firebase
      if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
        errorLogin.textContent = "Correo o contraseña incorrectos en Firebase.";
      } else if (error.code === 'auth/invalid-api-key') {
        errorLogin.textContent = "Error: Revisa que tu apiKey en firebaseConfig sea la correcta.";
      } else {
        errorLogin.textContent = "Error de conexión/autenticación: " + error.message;
      }
      
      errorLogin.classList.remove("hidden");
    }
  });

  // --- AUTENTICACIÓN: OBSERVAR ESTADO EN TIEMPO REAL ---
  onAuthStateChanged(auth, (user) => {
    if (user) {
      seccionLogin.classList.add("hidden");
      seccionInventario.classList.remove("hidden");
    } else {
      seccionLogin.classList.remove("hidden");
      seccionInventario.classList.add("hidden");
    }
  });

  // --- AUTENTICACIÓN: CERRAR SESIÓN ---
  window.cerrarSesion = function() {
    signOut(auth);
  };

  // --- INVENTARIO: GUARDAR PRODUCTO EN FIREBASE ---
  const formProducto = document.getElementById("form-producto");
  if (formProducto) {
    formProducto.addEventListener("submit", async function(event) {
      event.preventDefault();

      const nuevoProducto = {
        codigo: document.getElementById("input-codigo").value,
        nombre: document.getElementById("input-nombre").value,
        categoria: document.getElementById("input-categoria").value,
        stock: parseInt(document.getElementById("input-stock").value),
        precio: parseFloat(document.getElementById("input-precio").value)
      };

      await addDoc(productosRef, nuevoProducto);
      formProducto.reset();
    });
  }

  // --- INVENTARIO: ELIMINAR PRODUCTO EN FIREBASE ---
  window.eliminarProductoCloud = async function(id) {
    if (confirm("¿Seguro que quieres borrar este producto de la nube?")) {
      const docRef = doc(db, "productos", id);
      await deleteDoc(docRef);
    }
  };
</script>
